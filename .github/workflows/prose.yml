name: Prose

# The spine obeys the prose rule it publishes (plan/0038): authored markdown carries
# zero prose tropes. `host-lifecycle prose .` is host-lint's `--docs` engine run
# in-process; it scans this repo's own tracked markdown (submodule files are gitlinks,
# not walked) and exits non-zero on any flag or warning.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  prose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Pinned to the same host-lifecycle the host gates on (v0.40.1), so the spine's
      # prose verdict matches every adopter's verify audit; v0.40.1 embeds the
      # host-lint engine that honors the per-repo LEXICON in the prose lane (host-lifecycle#2).
      - name: Install host-lifecycle (pinned)
        run: cargo install --git https://github.com/connollydavid/host-lifecycle --rev 909241661cd63eff38463a4c479e108048a21901 --root "$HOME/.local"
      - name: Prose gate (zero tropes in authored docs)
        run: "$HOME/.local/bin/host-lifecycle prose ."
